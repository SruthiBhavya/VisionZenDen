<!DOCTYPE html>
<html>
<head>
    <title>VisionZenDen | Focus</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
    <div class="nav-inner">
        <h2>VisionZenDen</h2>

        <div class="nav-links">
            <a href="index.html">Focus</a>
            <a href="dashboard.html">Dashboard</a>
        </div>
    </div>
</div>

<div class="container">

    <!-- HERO -->
    <div class="hero">
        <h1>VisionZenDen</h1>
        <p>Track focus sessions. Build consistency. Beat distractions.</p>

        <a href="#focusArea">
            <button>Start Focusing</button>
        </a>
    </div>

    <!-- TIMER -->
    <div id="focusArea" class="card">

        <h2>Focus Session</h2>

        <div class="circle">
            <div id="timer">25:00</div>
        </div>

        <button id="startBtn">Start Session</button>
        <button id="resetBtn">Reset</button>

        <p id="status"></p>

    </div>

    <!-- STATS -->
    <div class="card stats">
        <h3>Today's Stats</h3>
        <p>Total Focus: <span id="totalMinutes">0</span> mins</p>
        <p>Sessions: <span id="totalSessions">0</span></p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
